<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Admin — Morphii</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0B2E4E; --pink:#FF6FAE; --yellow:#FFFF00; --sky:#4DC8F0;
  --panel:#0d3557; --border:rgba(255,255,255,0.14); --ink-dim:rgba(255,255,255,0.55);
}
body{font-family:'Nunito',sans-serif;background:var(--navy);color:white;min-height:100vh;}
button,input{font-family:inherit;}
h1,.logo{font-family:'Fredoka One',cursive;}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:36px 32px;max-width:360px;width:100%;text-align:center;}
.login-card .logo{font-size:26px;margin-bottom:4px;}
.login-card .logo span{color:var(--pink);}
.login-sub{font-size:12.5px;color:var(--ink-dim);font-weight:700;margin-bottom:22px;}
.login-input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,0.06);color:white;font-size:13px;font-weight:700;margin-bottom:10px;outline:none;}
.login-input:focus{border-color:var(--pink);}
.login-btn{width:100%;padding:12px;border-radius:50px;border:none;background:var(--pink);color:white;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;margin-top:6px;box-shadow:0 4px 0 #c0437e;}
.login-err{margin-top:10px;font-size:12px;font-weight:700;color:#ff9b98;min-height:16px;}

/* ── ADMIN ── */
#adminScreen{display:none;}
.adm-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:16px 24px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.adm-header .logo{font-size:20px;}
.adm-header .logo span{color:var(--pink);}
.adm-user{font-size:12px;color:var(--ink-dim);font-weight:700;}
.adm-signout{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:white;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;}

.adm-main{max-width:1100px;margin:0 auto;padding:24px;}
.adm-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.adm-stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 16px;text-align:center;min-width:90px;}
.adm-stat b{display:block;font-family:'Fredoka One',cursive;font-size:20px;}
.adm-stat span{font-size:10.5px;color:var(--ink-dim);font-weight:800;text-transform:uppercase;letter-spacing:0.4px;}

.adm-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.adm-tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:white;font-size:12px;font-weight:800;cursor:pointer;}
.adm-tab.active{background:var(--pink);border-color:var(--pink);}

.adm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.adm-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.adm-card img{width:100%;aspect-ratio:1/1;object-fit:cover;cursor:zoom-in;background:#082138;}
.adm-card-body{padding:14px;}
.adm-card-title{font-weight:900;font-size:13.5px;margin-bottom:2px;}
.adm-card-meta{font-size:11px;color:var(--ink-dim);font-weight:700;margin-bottom:8px;}
.adm-card-row{font-size:12px;font-weight:700;margin-bottom:3px;}
.adm-card-row b{color:var(--ink-dim);font-weight:800;}
.adm-badge{display:inline-block;font-size:9.5px;font-weight:900;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;}
.adm-badge-pending{background:rgba(255,255,0,0.18);color:#FFFF00;}
.adm-badge-approved{background:rgba(85,239,196,0.18);color:#55EFC4;}
.adm-badge-rejected{background:rgba(255,94,91,0.18);color:#ff9b98;}
.adm-badge-fulfilled{background:rgba(77,200,240,0.18);color:#4DC8F0;}
.adm-card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.adm-btn{flex:1;min-width:70px;padding:7px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:white;font-size:11px;font-weight:800;cursor:pointer;}
.adm-btn.approve{border-color:#55EFC4;color:#55EFC4;}
.adm-btn.reject{border-color:#ff9b98;color:#ff9b98;}
.adm-btn.fulfill{border-color:#4DC8F0;color:#4DC8F0;}
.adm-btn.printed{border-color:var(--yellow);color:var(--yellow);}
.adm-empty{text-align:center;padding:60px 20px;color:var(--ink-dim);font-weight:700;}

.adm-card{position:relative;}
.adm-card-select{
  position:absolute;top:10px;left:10px;z-index:2;width:24px;height:24px;border-radius:7px;
  border:2px solid rgba(255,255,255,0.5);background:rgba(11,46,78,0.6);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:white;font-weight:900;
}
.adm-card-select.checked{background:var(--pink);border-color:var(--pink);}
.adm-card.printed-flag::after{
  content:'🖨 Printed';position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(255,255,0,0.9);color:#0B2E4E;font-size:9.5px;font-weight:900;padding:3px 8px;border-radius:20px;
}

.adm-lightbox{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;padding:24px;}
.adm-lightbox.show{display:flex;}
.adm-lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;}

/* ── FLOATING LAYOUT & PRINT BUTTON ── */
.adm-layout-fab{
  display:none;position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:40;
  padding:13px 26px;border-radius:50px;border:none;background:var(--yellow);color:#0B2E4E;
  font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.4);
}
.adm-layout-fab.show{display:block;}

/* ── PRINT LAYOUT MODAL (ported from the kiosk) ── */
#printModal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(7,25,41,0.92);backdrop-filter:blur(8px);
  flex-direction:column;align-items:center;overflow-y:auto;padding:24px;
}
#printModal.open{display:flex;}
.print-modal-inner{background:var(--navy);border-radius:24px;width:100%;max-width:900px;border:2px solid var(--border);overflow:hidden;margin:auto;}
.pmi-header{padding:18px 24px;background:#071929;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);}
.pmi-title{font-family:'Fredoka One',cursive;font-size:20px;color:white;}
.pmi-close{background:none;border:none;color:var(--ink-dim);font-size:22px;cursor:pointer;padding:4px 8px;}
.pmi-controls{padding:14px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:2px solid var(--border);}
.pmi-label{font-size:11px;font-weight:800;color:var(--ink-dim);text-transform:uppercase;letter-spacing:1px;}
.pmi-select{padding:7px 12px;border-radius:10px;background:rgba(255,255,255,0.08);border:1.5px solid var(--border);color:white;font-family:'Fredoka One',cursive;font-size:13px;outline:none;cursor:pointer;}
.pmi-select option{color:#000;}
.pmi-pack-btn{margin-left:auto;padding:8px 20px;background:var(--sky);color:#0B2E4E;border:none;border-radius:12px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer;box-shadow:0 3px 0 #2BA8D8;}
.pmi-body{padding:20px 24px;display:flex;gap:20px;flex-wrap:wrap;}
.paper-preview-wrap{flex:1;min-width:280px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.paper-canvas-wrap{border:2px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.4);background:white;max-width:100%;}
#paperCanvas{display:block;max-width:100%;cursor:grab;}
.pmi-sidebar{width:200px;flex-shrink:0;}
.pmi-sidebar-title{font-family:'Fredoka One',cursive;font-size:14px;color:var(--ink-dim);margin-bottom:10px;}
.pmi-pin-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.pmi-pin-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,0.05);font-size:11px;color:var(--ink-dim);font-weight:700;cursor:pointer;}
.pmi-pin-item canvas{border-radius:50%;flex-shrink:0;}
.print-action-btn{width:100%;padding:12px;background:var(--yellow);color:#0B2E4E;border:none;border-radius:14px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;box-shadow:0 5px 0 #B8B800;margin-top:12px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">morphii<span>.</span> Admin</div>
    <div class="login-sub">Order review — sign in to continue</div>
    <input type="email" id="loginEmail" class="login-input" placeholder="Admin email">
    <input type="password" id="loginPass" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="adm-header">
    <div class="logo">morphii<span>.</span> Order Admin</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="adm-user" id="admUserEmail"></div>
      <button class="adm-signout" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>
  <div class="adm-main">
    <div class="adm-stats" id="admStats"></div>
    <div class="adm-tabs" id="admTabs">
      <button class="adm-tab active" data-status="all" onclick="setFilter('all')">All</button>
      <button class="adm-tab" data-status="pending" onclick="setFilter('pending')">Pending</button>
      <button class="adm-tab" data-status="approved" onclick="setFilter('approved')">Approved</button>
      <button class="adm-tab" data-status="rejected" onclick="setFilter('rejected')">Rejected</button>
      <button class="adm-tab" data-status="fulfilled" onclick="setFilter('fulfilled')">Fulfilled</button>
      <button class="adm-tab" data-status="printed" onclick="setFilter('printed')">Printed</button>
    </div>
    <div class="adm-grid" id="ordersGrid"></div>
  </div>
</div>

<div class="adm-lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Design full view">
</div>

<button class="adm-layout-fab" id="layoutFab" onclick="openPrintModal()">🖨 Layout &amp; Print (<span id="layoutFabCount">0</span>)</button>

<!-- ══ PRINT MODAL (ported from the kiosk's print layout system) ══ -->
<div id="printModal">
  <div class="print-modal-inner">
    <div class="pmi-header">
      <div class="pmi-title">🖨 Print Layout</div>
      <button class="pmi-close" onclick="closePrintModal()">✕</button>
    </div>
    <div class="pmi-controls">
      <span class="pmi-label">Paper:</span>
      <select class="pmi-select" id="paperSize" onchange="packPins()">
        <option value="letter">Letter (8.5×11")</option>
        <option value="a4">A4 (8.27×11.69")</option>
      </select>
      <span style="font-size:11px;font-weight:700;color:var(--ink-dim);margin-left:12px;">Drag pins to reposition</span>
      <button class="pmi-pack-btn" onclick="packPins()">↺ Auto-arrange</button>
    </div>
    <div class="pmi-body">
      <div class="paper-preview-wrap">
        <div class="paper-canvas-wrap">
          <canvas id="paperCanvas"></canvas>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--ink-dim);margin-top:6px;" id="packInfo"></div>
        <button class="print-action-btn" onclick="doPrint()">🖨 Send to Printer</button>
      </div>
      <div class="pmi-sidebar">
        <div class="pmi-sidebar-title">Pin Queue</div>
        <div style="font-size:9px;font-weight:700;color:var(--ink-dim);margin-bottom:8px;">Click to include on paper</div>
        <div class="pmi-pin-list" id="pmiPinList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat mode — no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let currentFilter = 'all';
let allOrders = [];
let ordersUnsub = null;
let selectedOrders = new Set();

function doLogin(){
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!AUTH){ errEl.textContent = 'Firebase not configured yet — see firebase-config.js'; return; }
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass){ errEl.textContent = 'Enter email and password.'; return; }
  AUTH.signInWithEmailAndPassword(email, pass)
    .catch(err => { errEl.textContent = err.message; });
}
window.doLogin = doLogin;

function doSignOut(){
  if (AUTH) AUTH.signOut();
}
window.doSignOut = doSignOut;

if (AUTH){
  AUTH.onAuthStateChanged(user => {
    if (user && isAdmin(user)){
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      document.getElementById('admUserEmail').textContent = user.email;
      subscribeOrders();
    } else {
      if (ordersUnsub){ ordersUnsub(); ordersUnsub = null; }
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminScreen').style.display = 'none';
      if (user && !isAdmin(user)){
        document.getElementById('loginErr').textContent = 'This account is not authorized as an admin.';
        AUTH.signOut();
      }
    }
  });
}

function subscribeOrders(){
  if (ordersUnsub) return;
  ordersUnsub = DB.collection('morphii_orders').orderBy('createdAt','desc')
    .onSnapshot(snap => {
      allOrders = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      const liveIds = new Set(allOrders.map(o=>o.id));
      selectedOrders.forEach(id => { if (!liveIds.has(id)) selectedOrders.delete(id); });
      renderStats();
      renderOrders();
      updateLayoutFab();
    }, err => console.warn('Orders listener error:', err));
}

function renderStats(){
  const counts = { all: allOrders.length, pending:0, approved:0, rejected:0, fulfilled:0, printed:0 };
  allOrders.forEach(o => { if (counts[o.status] != null) counts[o.status]++; if (o.printed) counts.printed++; });
  const el = document.getElementById('admStats');
  el.innerHTML = Object.entries(counts).map(([k,v]) =>
    `<div class="adm-stat"><b>${v}</b><span>${k}</span></div>`).join('');
}

function setFilter(status){
  currentFilter = status;
  document.querySelectorAll('.adm-tab').forEach(t => t.classList.toggle('active', t.dataset.status===status));
  renderOrders();
}
window.setFilter = setFilter;

function renderOrders(){
  const grid = document.getElementById('ordersGrid');
  const list = currentFilter==='all' ? allOrders
    : currentFilter==='printed' ? allOrders.filter(o=>o.printed)
    : allOrders.filter(o=>o.status===currentFilter);
  if (!list.length){
    grid.innerHTML = '<div class="adm-empty">No orders here yet.</div>';
    return;
  }
  grid.innerHTML = list.map(o => {
    const dt = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleString() : '';
    const sel = selectedOrders.has(o.id);
    return `
    <div class="adm-card ${o.printed?'printed-flag':''}">
      <div class="adm-card-select ${sel?'checked':''}" onclick="event.stopPropagation();toggleSelect('${o.id}')">${sel?'✓':''}</div>
      <img src="${o.designDataUrl||''}" onclick="openLightbox('${o.id}')" alt="Design">
      <div class="adm-card-body">
        <span class="adm-badge adm-badge-${o.status}">${o.status}</span>
        <div class="adm-card-title">${escHtml(o.productLabel||o.product||'')}</div>
        <div class="adm-card-meta">${(o.size||'').toFixed ? o.size.toFixed(2) : o.size}" Circle · ${o.bleedMode==='wrap'?'Wrap':'Die-Cut'} · ${escHtml(dt)}</div>
        ${o.saveCode ? `<div class="adm-card-row"><b>Code:</b> <span style="font-family:monospace;letter-spacing:1px">${escHtml(o.saveCode)}</span></div>` : ''}
        <div class="adm-card-row"><b>Name:</b> ${escHtml(o.customerName)}</div>
        <div class="adm-card-row"><b>Email:</b> ${escHtml(o.customerEmail||o.customerContact)}</div>
        ${o.customerPhone ? `<div class="adm-card-row"><b>Phone:</b> ${escHtml(o.customerPhone)}</div>` : ''}
        ${o.shopeeOrderId ? `<div class="adm-card-row"><b>Shopee:</b> ${escHtml(o.shopeeOrderId)}</div>` : ''}
        ${o.notes ? `<div class="adm-card-row"><b>Notes:</b> ${escHtml(o.notes)}</div>` : ''}
        <div class="adm-card-actions">
          <button class="adm-btn approve" onclick="setStatus('${o.id}','approved')">Approve</button>
          <button class="adm-btn reject" onclick="setStatus('${o.id}','rejected')">Reject</button>
          <button class="adm-btn fulfill" onclick="setStatus('${o.id}','fulfilled')">Fulfilled</button>
          <button class="adm-btn printed" onclick="togglePrinted('${o.id}')">${o.printed?'✓ Printed':'🖨 Queue'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSelect(id){
  if (selectedOrders.has(id)) selectedOrders.delete(id); else selectedOrders.add(id);
  renderOrders();
  updateLayoutFab();
}
window.toggleSelect = toggleSelect;

function updateLayoutFab(){
  const fab = document.getElementById('layoutFab');
  document.getElementById('layoutFabCount').textContent = selectedOrders.size;
  fab.classList.toggle('show', selectedOrders.size > 0);
}

function togglePrinted(id){
  const o = allOrders.find(x=>x.id===id);
  if (!o) return;
  DB.collection('morphii_orders').doc(id).update({ printed: !o.printed }).catch(err => alert('Error: '+err.message));
}
window.togglePrinted = togglePrinted;

function setStatus(id, status){
  DB.collection('morphii_orders').doc(id).update({ status }).catch(err => alert('Error: '+err.message));
}
window.setStatus = setStatus;

function openLightbox(id){
  const o = allOrders.find(x=>x.id===id);
  if (!o) return;
  document.getElementById('lightboxImg').src = o.designDataUrl||'';
  document.getElementById('lightbox').classList.add('show');
}
window.openLightbox = openLightbox;
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }
window.closeLightbox = closeLightbox;

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── PRINT LAYOUT (ported from the kiosk's morphii.js) ──────────────
   Same shelf-packing approach: place circles left-to-right on a shelf,
   start a new shelf when the next one doesn't fit, shelf height = the
   tallest pin on it. Orders use `designDataUrl` (already a clean,
   watermark-free composite) and `size` (inches) same as the kiosk's
   sub.thumb/sub.size. ── */
const PAPER_SIZES = { letter:{ w:8.5, h:11 }, a4:{ w:8.27, h:11.69 } };
const MARGIN_IN = 0.4;
const PREVIEW_W = 420;

let layoutPins = []; // {order, cx, cy, rad, dPx, active, img}
let dragIdx = -1, dragOffX = 0, dragOffY = 0;
let printScale = 1, printMg = 0;

function openPrintModal(){
  if (selectedOrders.size===0) return;
  document.getElementById('printModal').classList.add('open');
  packPins();
  setTimeout(initPaperDrag, 100);
}
window.openPrintModal = openPrintModal;
function closePrintModal(){
  document.getElementById('printModal').classList.remove('open');
}
window.closePrintModal = closePrintModal;

function packPins(){
  const paper = PAPER_SIZES[document.getElementById('paperSize').value];
  const GAP = 0.12;
  const usableW = paper.w - MARGIN_IN*2;
  const usableH = paper.h - MARGIN_IN*2;
  printScale = PREVIEW_W / paper.w;
  printMg = MARGIN_IN * printScale;
  const gapPx = GAP * printScale;

  const orders = allOrders.filter(o => selectedOrders.has(o.id));

  let shelfX=printMg, shelfY=printMg, shelfH=0;
  layoutPins = [];
  for (const order of orders){
    const d = (parseFloat(order.size)||2.25) * printScale;
    const rad = d/2 - 2;
    if (shelfX+d > printMg+(usableW*printScale) && shelfX>printMg){ shelfY+=shelfH+gapPx; shelfX=printMg; shelfH=0; }
    if (shelfY+d > printMg+(usableH*printScale)) break;
    layoutPins.push({ order, cx:shelfX+d/2, cy:shelfY+d/2, rad, dPx:d, active:true, img:null });
    shelfX += d+gapPx; shelfH = Math.max(shelfH, d);
  }
  layoutPins.forEach(p => {
    if (!p.order.designDataUrl) return;
    const img = new Image();
    img.onload = () => { p.img = img; renderPaperCanvas(); };
    img.src = p.order.designDataUrl;
  });
  renderPaperCanvas();
  renderPmiSidebar();
}
window.packPins = packPins;

function renderPaperCanvas(){
  const paper = PAPER_SIZES[document.getElementById('paperSize').value];
  const canvH = Math.round(paper.h * printScale);
  const pc = document.getElementById('paperCanvas');
  pc.width = PREVIEW_W; pc.height = canvH;
  const ctx = pc.getContext('2d');

  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,PREVIEW_W,canvH);
  ctx.setLineDash([3,3]); ctx.strokeStyle = 'rgba(180,180,180,0.5)'; ctx.lineWidth = 0.7;
  ctx.strokeRect(printMg, printMg, PREVIEW_W-printMg*2, canvH-printMg*2);
  ctx.setLineDash([]);

  layoutPins.forEach(p => {
    if (!p.active){
      ctx.save(); ctx.globalAlpha = 0.2;
      ctx.beginPath(); ctx.arc(p.cx,p.cy,p.rad,0,Math.PI*2);
      ctx.strokeStyle = '#CCC'; ctx.lineWidth = 1; ctx.setLineDash([3,2]); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
      return;
    }
    ctx.save();
    if (p.img){
      ctx.beginPath(); ctx.arc(p.cx,p.cy,p.rad,0,Math.PI*2); ctx.clip();
      ctx.drawImage(p.img, p.cx-p.rad, p.cy-p.rad, p.rad*2, p.rad*2);
    } else {
      ctx.beginPath(); ctx.arc(p.cx,p.cy,p.rad,0,Math.PI*2);
      ctx.fillStyle = '#EEF6FF'; ctx.fill();
      ctx.fillStyle = '#AAA'; ctx.font = `bold ${Math.max(7,p.rad*0.25)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText((p.order.size||'')+'"', p.cx, p.cy);
    }
    ctx.restore();
    ctx.save();
    ctx.beginPath(); ctx.arc(p.cx,p.cy,p.rad+1,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.restore();
    const bx = p.cx+p.rad*0.62, by = p.cy-p.rad*0.62;
    ctx.save();
    ctx.fillStyle = '#55EFC4'; ctx.beginPath(); ctx.arc(bx,by,Math.max(5,p.rad*0.22),0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white'; ctx.font = `bold ${Math.max(5,p.rad*0.18)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('✓', bx, by);
    ctx.restore();
  });

  const active = layoutPins.filter(p=>p.active);
  const counts = {}; active.forEach(p => { counts[p.order.size] = (counts[p.order.size]||0)+1; });
  const bd = Object.entries(counts).map(([s,n])=>`${n}×${s}"`).join(' · ');
  document.getElementById('packInfo').textContent = `${active.length} pins on paper${bd?' · '+bd:''}`;
}

function renderPmiSidebar(){
  const list = document.getElementById('pmiPinList');
  list.innerHTML = '';
  const orders = allOrders.filter(o => selectedOrders.has(o.id));
  orders.forEach(order => {
    const idx = layoutPins.findIndex(p=>p.order.id===order.id);
    const onPaper = idx>=0;
    const isActive = onPaper && layoutPins[idx].active;
    const item = document.createElement('div');
    item.className = 'pmi-pin-item';
    item.style.cssText = `border:1.5px solid ${isActive?'#55EFC4':'rgba(255,255,255,0.08)'};background:${isActive?'rgba(85,239,196,0.08)':'rgba(255,255,255,0.03)'};`;
    const mc = document.createElement('canvas'); mc.width=28; mc.height=28;
    const mctx = mc.getContext('2d');
    const mi = new Image();
    mi.onload = function(){ mctx.save(); mctx.beginPath(); mctx.arc(14,14,13,0,Math.PI*2); mctx.clip(); mctx.drawImage(mi,0,0,28,28); mctx.restore(); };
    if (order.designDataUrl) mi.src = order.designDataUrl;
    item.appendChild(mc);
    const info = document.createElement('div'); info.style.flex = '1';
    info.innerHTML = `<div style="font-size:10px;color:white;font-weight:800">${escHtml(order.customerName||'')}</div><div style="font-size:8px;color:var(--ink-dim)">${order.size}" · ${escHtml(order.productLabel||order.product||'')}</div>`;
    item.appendChild(info);
    const cb = document.createElement('div');
    cb.style.cssText = `width:18px;height:18px;border-radius:5px;border:2px solid ${isActive?'#55EFC4':'rgba(255,255,255,0.2)'};background:${isActive?'#55EFC4':'transparent'};display:flex;align-items:center;justify-content:center;font-size:10px;color:#0B2E4E;flex-shrink:0;`;
    if (isActive) cb.textContent = '✓';
    item.appendChild(cb);
    item.onclick = () => {
      if (idx>=0){ layoutPins[idx].active = !layoutPins[idx].active; }
      else {
        const d = (parseFloat(order.size)||2.25) * printScale;
        layoutPins.push({ order, cx:printMg+d/2+10, cy:printMg+d/2+10, rad:d/2-2, dPx:d, active:true, img:null });
        if (order.designDataUrl){
          const img = new Image();
          img.onload = () => { layoutPins[layoutPins.length-1].img = img; renderPaperCanvas(); };
          img.src = order.designDataUrl;
        }
      }
      renderPaperCanvas(); renderPmiSidebar();
    };
    list.appendChild(item);
  });
}

function initPaperDrag(){
  const pc = document.getElementById('paperCanvas');
  if (!pc || pc._dragInited) return;
  pc._dragInited = true;
  function getPos(e){
    const r = pc.getBoundingClientRect();
    const scx = pc.width/r.width, scy = pc.height/r.height;
    const cx = (e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const cy = (e.touches?e.touches[0].clientY:e.clientY)-r.top;
    return { x:cx*scx, y:cy*scy };
  }
  function startDrag(e){
    const { x, y } = getPos(e);
    dragIdx = -1;
    for (let i=layoutPins.length-1; i>=0; i--){
      const p = layoutPins[i];
      if (!p.active) continue;
      const dx=x-p.cx, dy=y-p.cy;
      if (dx*dx+dy*dy < p.rad*p.rad){ dragIdx=i; dragOffX=dx; dragOffY=dy; break; }
    }
    if (dragIdx>=0) pc.style.cursor = 'grabbing';
    e.preventDefault();
  }
  function moveDrag(e){
    if (dragIdx<0) return;
    const { x, y } = getPos(e);
    layoutPins[dragIdx].cx = x-dragOffX;
    layoutPins[dragIdx].cy = y-dragOffY;
    renderPaperCanvas();
    e.preventDefault();
  }
  function endDrag(){ dragIdx=-1; pc.style.cursor='grab'; }
  pc.addEventListener('mousedown', startDrag);
  pc.addEventListener('mousemove', moveDrag);
  pc.addEventListener('mouseup', endDrag);
  pc.addEventListener('touchstart', startDrag, { passive:false });
  pc.addEventListener('touchmove', moveDrag, { passive:false });
  pc.addEventListener('touchend', endDrag);
}

function doPrint(){
  const pc = document.getElementById('paperCanvas');
  const paper = PAPER_SIZES[document.getElementById('paperSize').value];
  const win = window.open('', '_blank');
  const img = pc.toDataURL('image/png');
  win.document.write(`<!DOCTYPE html><html><head><title>Morphii Print</title>
    <style>*{margin:0;padding:0;}body{background:white;}
    img{width:${paper.w}in;height:${paper.h}in;display:block;}
    @media print{@page{size:${paper.w}in ${paper.h}in;margin:0;}img{width:100%;height:100%;}}
    </style></head><body>
    <img src="${img}" onload="setTimeout(()=>{window.print();window.close();},200)">
    </body></html>`);
  const batch = DB.batch();
  layoutPins.filter(p=>p.active).forEach(p => {
    batch.update(DB.collection('morphii_orders').doc(p.order.id), { printed:true });
  });
  batch.commit().catch(err => console.warn('Failed to mark orders printed:', err));
}
window.doPrint = doPrint;
